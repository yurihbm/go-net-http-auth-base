name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Run tests
        run: |
          make show-cover > coverage_summary.txt

      - name: Prepare comment body
        if: github.event_name == 'pull_request'
        run: |
          echo "### Test Results" > comment.md
          echo "" >> comment.md
          echo '```' >> comment.md
          cat coverage_summary.txt >> comment.md
          echo '```' >> comment.md

      - name: Post or update comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          path: comment.md
